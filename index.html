<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tree Carbon">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<title>Tree Carbon Inventory — รพ.ลานสกา</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#1D9E75;--gl:#E1F5EE;--gd:#085041;
  --blue:#185FA5;--bl:#E6F1FB;
  --amber:#BA7517;--al:#FAEEDA;
  --red:#A32D2D;--rl:#FCEBEB;
  --bg:#fff;--bg2:#f5f5f3;--bg3:#ebebea;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#9c9a92;
  --bdr:rgba(0,0,0,0.12);--bdr2:rgba(0,0,0,0.22);
  --r:12px;--rs:8px;
  --font:'Sarabun',system-ui,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1a;--bg2:#2a2a27;--bg3:#333330;--text:#e8e6dc;--text2:#9c9a92;--text3:#66645e;--bdr:rgba(255,255,255,0.1);--bdr2:rgba(255,255,255,0.2)}
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:68px;min-height:100vh}
.page{display:none}.page.active{display:block;animation:fi .15s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.hdr{background:var(--bg);border-bottom:0.5px solid var(--bdr);padding:11px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-title{font-size:17px;font-weight:600;flex:1}
.back{background:none;border:none;color:var(--green);font-size:15px;cursor:pointer;padding:4px 8px;font-family:var(--font)}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:0.5px solid var(--bdr);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;background:none;border:none;padding:7px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--font);font-size:10px;color:var(--text2);transition:color .15s}
.nb.active{color:var(--green)}
.ni{font-size:19px}
.card{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r);padding:13px 15px;margin:8px 12px}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:11px 12px 0}
.met{background:var(--bg2);border-radius:var(--rs);padding:9px 7px;text-align:center}
.mv{font-size:21px;font-weight:700;line-height:1.1;margin:2px 0}
.ml{font-size:11px;color:var(--text2)}.mu{font-size:10px;color:var(--text3)}
label.fl{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
input,select,textarea{width:100%;padding:9px 11px;border:0.5px solid var(--bdr2);border-radius:var(--rs);font-size:15px;background:var(--bg);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
input[readonly]{background:var(--bg2);color:var(--text2)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.bp{background:var(--green);color:#fff;border:none;border-radius:var(--rs);padding:12px;width:100%;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)}
.bp:disabled{opacity:.5}.bp.blue{background:var(--blue)}.bp.red{background:var(--red)}
.bo{background:none;border:0.5px solid var(--bdr2);border-radius:var(--rs);padding:9px 13px;font-size:13px;cursor:pointer;color:var(--text);font-family:var(--font)}
.bgps{background:var(--gl);color:var(--gd);border:0.5px solid var(--green);border-radius:var(--rs);padding:9px 12px;font-size:13px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:5px;white-space:nowrap}
.bsm{background:var(--bl);color:var(--blue);border:0.5px solid var(--blue);border-radius:var(--rs);padding:9px 12px;font-size:13px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:5px;white-space:nowrap}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.chip{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:20px;padding:5px 11px;font-size:13px;cursor:pointer;color:var(--text2);font-family:var(--font);transition:all .15s}
.chip.sel{background:var(--green);color:#fff;border-color:var(--green)}
.cr{background:var(--bg2);border-radius:var(--rs);padding:11px}
.cg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center}
.cv{font-size:17px;font-weight:600;color:var(--green)}.cl{font-size:11px;color:var(--text2);margin-top:1px}
.ti{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r);padding:11px 13px;margin:7px 12px}
.th2{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.ts3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.sv{font-size:14px;font-weight:600}.sl{font-size:10px;color:var(--text3)}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.pg{background:var(--gl);color:var(--gd)}.pb{background:var(--bl);color:var(--blue)}.pa{background:var(--al);color:var(--amber)}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:9px 18px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.gst{font-size:12px;color:var(--green);margin-top:4px}
.empty{text-align:center;padding:36px 18px;color:var(--text2)}
.ei{font-size:42px;margin-bottom:10px}
/* Photo */
.photo-wrap{position:relative;width:100%;aspect-ratio:4/3;background:var(--bg2);border-radius:var(--rs);overflow:hidden;margin-top:6px;border:0.5px solid var(--bdr)}
.photo-wrap img{width:100%;height:100%;object-fit:cover}
.photo-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:6px;color:var(--text3);font-size:13px}
.photo-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px}
.bcam{background:var(--bg2);border:0.5px solid var(--bdr2);border-radius:var(--rs);padding:9px;font-size:13px;cursor:pointer;color:var(--text);font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px}
/* Map */
#map-view{height:calc(100vh - 115px);width:100%}
.map-filter{padding:8px 12px;display:flex;gap:7px;overflow-x:auto;background:var(--bg);border-bottom:0.5px solid var(--bdr)}
.mf-chip{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:var(--font);color:var(--text2)}
.mf-chip.sel{background:var(--green);color:#fff;border-color:var(--green)}
/* Dashboard */
.db-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:11px 12px 0}
.db-card{background:var(--bg2);border-radius:var(--rs);padding:10px 11px}
.db-lbl{font-size:11px;color:var(--text2);margin-bottom:3px}
.db-val{font-size:19px;font-weight:700}
.chart-wrap{margin:0 12px;background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r);padding:12px;overflow:hidden}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-lbl{font-size:11px;color:var(--text2);width:36px;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:var(--bg2);border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;background:var(--green);border-radius:4px;transition:width .4s;display:flex;align-items:center;justify-content:flex-end;padding-right:5px}
.bar-val{font-size:10px;color:#fff;font-weight:600}
/* Sync status */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.sync-ok{background:#1D9E75}.sync-pending{background:#BA7517}.sync-err{background:#A32D2D}
</style>
</head>
<body>
<div class="app">
<div class="toast" id="toast"></div>

<!-- ===== HOME ===== -->
<div class="page active" id="page-home">
  <div class="hdr">
    <span style="font-size:21px">🌳</span>
    <span class="hdr-title">Tree Carbon</span>
    <span style="font-size:11px;color:var(--text2)">รพ.ลานสกา</span>
    <span id="sync-status" style="font-size:11px;margin-left:6px"></span>
  </div>
  <div class="metrics">
    <div class="met"><div class="ml">ต้นไม้</div><div class="mv" id="s-trees" style="color:var(--green)">0</div><div class="mu">ต้น</div></div>
    <div class="met"><div class="ml">Carbon</div><div class="mv" id="s-carbon" style="color:var(--blue)">0</div><div class="mu">kgC</div></div>
    <div class="met"><div class="ml">CO₂</div><div class="mv" id="s-co2" style="color:var(--amber)">0</div><div class="mu">kgCO₂</div></div>
  </div>
  <div style="padding:9px 12px 0">
    <button class="bp" onclick="goAdd()">+ บันทึกต้นไม้ใหม่</button>
  </div>
  <div id="tree-list"></div>
</div>

<!-- ===== ADD ===== -->
<div class="page" id="page-add">
  <div class="hdr">
    <button class="back" onclick="goPage('home')">← กลับ</button>
    <span class="hdr-title">บันทึกต้นไม้</span>
    <span id="add-sync" style="font-size:11px;color:var(--text3)"></span>
  </div>
  <div class="card">
    <div class="r2">
      <div><label class="fl">Tree ID *</label><input id="f-id" placeholder="T001"></div>
      <div><label class="fl">วันที่สำรวจ *</label><input type="date" id="f-date"></div>
    </div>
  </div>
  <div class="card">
    <label class="fl">ชนิดพันธุ์ไม้ *</label>
    <div class="chips" id="sp-chips"></div>
    <input id="f-sp" placeholder="หรือพิมพ์ชื่อพันธุ์ไม้..." oninput="syncSp(this.value)">
  </div>
  <div class="card">
    <div class="r2">
      <div><label class="fl">เส้นรอบวง (ซม.) *</label><input type="number" id="f-circ" placeholder="0" oninput="calc()" inputmode="decimal"></div>
      <div><label class="fl">DBH (ซม.) — อัตโนมัติ</label><input id="f-dbh" readonly></div>
    </div>
  </div>
  <div class="card">
    <label class="fl">ความสูง (เมตร)</label>
    <div style="display:flex;gap:7px;align-items:flex-start">
      <input type="number" id="f-h" placeholder="0.0" oninput="calc()" inputmode="decimal" style="flex:1">
      <button class="bsm" onclick="openSM()">📏 Smart<br>Measure</button>
    </div>
  </div>
  <div class="card">
    <label class="fl">พิกัด GPS</label>
    <div style="display:flex;gap:7px;margin-bottom:7px;flex-wrap:wrap">
      <button class="bgps" onclick="getGPS()">📍 ยิงพิกัดอัตโนมัติ</button>
      <div id="gps-st" class="gst"></div>
    </div>
    <div class="r2">
      <div><label class="fl">Latitude</label><input type="number" id="f-lat" placeholder="7.xxxxx" step="0.000001" inputmode="decimal"></div>
      <div><label class="fl">Longitude</label><input type="number" id="f-lng" placeholder="99.xxxxx" step="0.000001" inputmode="decimal"></div>
    </div>
  </div>
  <div class="card">
    <div class="r2">
      <div>
        <label class="fl">ประเภทพื้นที่</label>
        <select id="f-land">
          <option value="">เลือก...</option>
          <option>สวนหย่อม</option><option>ลานจอดรถ</option><option>ริมรั้ว</option>
          <option>หน้าอาคาร</option><option>พื้นที่สีเขียว</option><option>อื่นๆ</option>
        </select>
      </div>
      <div>
        <label class="fl">สถานะสุขภาพ</label>
        <select id="f-health">
          <option value="">เลือก...</option>
          <option>ยอดเยี่ยม</option><option>ดี</option><option>ปานกลาง</option><option>ต้องดูแล</option>
        </select>
      </div>
    </div>
  </div>
  <!-- Photo Section -->
  <div class="card">
    <label class="fl">รูปถ่ายต้นไม้</label>
    <div class="photo-wrap" id="photo-preview">
      <div class="photo-placeholder"><span style="font-size:32px">📷</span><span>ยังไม่มีรูปภาพ</span></div>
    </div>
    <div class="photo-btns">
      <button class="bcam" onclick="takePhoto()">📷 ถ่ายรูป</button>
      <button class="bcam" onclick="pickPhoto()">🖼️ เลือกจากคลัง</button>
    </div>
    <input type="file" id="cam-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this,'cam')">
    <input type="file" id="gal-input" accept="image/*" style="display:none" onchange="handlePhoto(this,'gal')">
  </div>
  <div class="card">
    <div class="cr">
      <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:7px">ผลการคำนวณคาร์บอน</div>
      <div class="cg">
        <div><div class="cv" id="r-dbh">—</div><div class="cl">DBH (ซม.)</div></div>
        <div><div class="cv" id="r-c">—</div><div class="cl">Carbon (kgC)</div></div>
        <div><div class="cv" id="r-co2">—</div><div class="cl">CO₂ (kgCO₂)</div></div>
      </div>
    </div>
  </div>
  <div class="card">
    <label class="fl">ผู้สำรวจ</label>
    <input id="f-who" placeholder="ชื่อ-นามสกุล">
  </div>
  <div style="padding:8px 12px 16px;display:flex;flex-direction:column;gap:7px">
    <button class="bp" id="save-btn" onclick="saveTree()">💾 บันทึกและส่ง Sheets</button>
  </div>
</div>

<!-- ===== MAP ===== -->
<div class="page" id="page-map">
  <div class="hdr"><span class="hdr-title">แผนที่ต้นไม้</span></div>
  <div class="map-filter" id="map-filter"></div>
  <div id="map-view"></div>
</div>

<!-- ===== DASHBOARD ===== -->
<div class="page" id="page-dash">
  <div class="hdr"><span class="hdr-title">Dashboard คาร์บอน</span></div>
  <div id="dash-content"></div>
</div>

<!-- ===== EXPORT ===== -->
<div class="page" id="page-export">
  <div class="hdr"><span class="hdr-title">ส่งออก / ตั้งค่า</span></div>
  <div class="card">
    <div style="font-weight:600;margin-bottom:10px;font-size:14px">🔗 เชื่อมต่อ Google Sheets</div>
    <label class="fl">Web App URL (จาก Apps Script)</label>
    <input id="gs-url" placeholder="https://script.google.com/macros/s/..." style="margin-bottom:8px">
    <button class="bp" onclick="testGS()">🧪 ทดสอบการเชื่อมต่อ</button>
    <div id="gs-result" style="font-size:12px;margin-top:7px;color:var(--text2)"></div>
  </div>
  <div class="card">
    <div style="font-weight:600;margin-bottom:10px;font-size:14px">📊 สถานะข้อมูล</div>
    <div class="r2">
      <div class="met"><div class="ml">รอส่ง</div><div class="mv" id="ex-pending" style="color:var(--amber)">0</div><div class="mu">รายการ</div></div>
      <div class="met"><div class="ml">ส่งแล้ว</div><div class="mv" id="ex-sent" style="color:var(--green)">0</div><div class="mu">รายการ</div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:7px;margin-top:10px">
      <button class="bp" onclick="syncAll()">☁️ ส่งข้อมูลทั้งหมดไป Sheets</button>
      <button class="bp blue" onclick="dlCSV()">⬇️ ดาวน์โหลด CSV</button>
      <button class="bp" style="background:var(--bg2);color:var(--text);border:0.5px solid var(--bdr2)" onclick="openSheets()">📋 เปิด Google Sheets</button>
    </div>
  </div>
  <div class="card">
    <button class="bp red" onclick="clearAll()" style="font-size:13px">🗑️ ล้างข้อมูลทั้งหมดในเครื่อง</button>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nb active" id="nav-home" onclick="goPage('home')"><span class="ni">🏠</span><span>หน้าหลัก</span></button>
  <button class="nb" id="nav-add" onclick="goAdd()"><span class="ni">➕</span><span>บันทึก</span></button>
  <button class="nb" id="nav-map" onclick="goPage('map')"><span class="ni">🗺️</span><span>แผนที่</span></button>
  <button class="nb" id="nav-dash" onclick="goPage('dash')"><span class="ni">📊</span><span>Dashboard</span></button>
  <button class="nb" id="nav-export" onclick="goPage('export')"><span class="ni">⚙️</span><span>ตั้งค่า</span></button>
</nav>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SP = ['มังคุด','พยุง','มะขาม','สัก','มะม่วง','ประดู่','จามจุรี','มะพร้าว','ราชพฤกษ์','ตะเคียนทอง','อื่นๆ'];
const SHEET_ID = '1_N2nmvYyHPJJZqewxuMFlJzb3KGiM_8sCBFh3ZWu4sE';

let trees = JSON.parse(localStorage.getItem('trees_lsk')||'[]');
let gsURL = localStorage.getItem('gs_url')||'';
let photoData = '';
let mapInst = null;
let nextId = trees.length ? Math.max(...trees.map(t=>parseInt(t.treeId?.replace(/\D/g,''))||0))+1 : 1;

// ---- NAV ----
function goPage(p) {
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(e=>e.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p)?.classList.add('active');
  window.scrollTo(0,0);
  if(p==='home') renderHome();
  if(p==='map') renderMap();
  if(p==='dash') renderDash();
  if(p==='export') renderExport();
}

function goAdd() {
  const id = 'T'+String(nextId).padStart(3,'0');
  document.getElementById('f-id').value = id;
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  ['f-sp','f-circ','f-h','f-lat','f-lng','f-who','f-dbh'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('f-land').value='';
  document.getElementById('f-health').value='';
  document.getElementById('gps-st').textContent='';
  document.getElementById('r-dbh').textContent='—';
  document.getElementById('r-c').textContent='—';
  document.getElementById('r-co2').textContent='—';
  document.getElementById('photo-preview').innerHTML='<div class="photo-placeholder"><span style="font-size:32px">📷</span><span>ยังไม่มีรูปภาพ</span></div>';
  photoData = '';
  renderChips('');
  goPage('add');
}

// ---- CHIPS ----
function renderChips(sel) {
  document.getElementById('sp-chips').innerHTML = SP.map(s=>
    `<button class="chip ${s===sel?'sel':''}" onclick="selSp('${s}')">${s}</button>`
  ).join('');
}
function selSp(s) {
  document.getElementById('f-sp').value = s==='อื่นๆ'?'':s;
  renderChips(s==='อื่นๆ'?'':s);
}
function syncSp(v) { renderChips(SP.find(s=>s===v)||''); }

// ---- CALC ----
function calc() {
  const c=parseFloat(document.getElementById('f-circ').value)||0;
  const h=parseFloat(document.getElementById('f-h').value)||0;
  const dbh=c>0?c/Math.PI:0;
  document.getElementById('f-dbh').value=dbh>0?dbh.toFixed(4):'';
  if(dbh>0&&h>0){
    const carbon=0.0673*Math.pow(0.0673*dbh*dbh*h,0.976);
    const co2=carbon*3.67;
    document.getElementById('r-dbh').textContent=dbh.toFixed(2);
    document.getElementById('r-c').textContent=carbon.toFixed(4);
    document.getElementById('r-co2').textContent=co2.toFixed(4);
  } else if(dbh>0){
    document.getElementById('r-dbh').textContent=dbh.toFixed(2);
    document.getElementById('r-c').textContent='—';
    document.getElementById('r-co2').textContent='—';
  } else {
    document.getElementById('r-dbh').textContent='—';
    document.getElementById('r-c').textContent='—';
    document.getElementById('r-co2').textContent='—';
  }
}

// ---- GPS ----
function getGPS() {
  const el=document.getElementById('gps-st');
  el.textContent='กำลังระบุตำแหน่ง...';
  if(!navigator.geolocation){el.textContent='ไม่รองรับ GPS';return;}
  navigator.geolocation.getCurrentPosition(
    p=>{
      document.getElementById('f-lat').value=p.coords.latitude.toFixed(6);
      document.getElementById('f-lng').value=p.coords.longitude.toFixed(6);
      el.textContent='✓ '+p.coords.latitude.toFixed(5)+', '+p.coords.longitude.toFixed(5);
    },
    ()=>el.textContent='ระบุตำแหน่งไม่ได้',
    {enableHighAccuracy:true,timeout:12000}
  );
}

// ---- SAVE ----
async function saveTree() {
  const id=document.getElementById('f-id').value.trim();
  const sp=document.getElementById('f-sp').value.trim();
  const circ=document.getElementById('f-circ').value.trim();
  const date=document.getElementById('f-date').value;
  if(!id||!sp||!circ||!date){toast('กรุณากรอก: Tree ID, ชนิดพันธุ์, เส้นรอบวง, วันที่');return;}
  const dbh=circ?(parseFloat(circ)/Math.PI):0;
  const h=parseFloat(document.getElementById('f-h').value)||0;
  const carbon=(dbh>0&&h>0)?0.0673*Math.pow(0.0673*dbh*dbh*h,0.976):0;
  const co2=carbon*3.67;
  const rec={
    treeId:id,surveyDate:date,species:sp,
    circumference:circ,
    height:document.getElementById('f-h').value||'',
    lat:document.getElementById('f-lat').value||'',
    lng:document.getElementById('f-lng').value||'',
    landType:document.getElementById('f-land').value||'',
    healthStatus:document.getElementById('f-health').value||'',
    surveyBy:document.getElementById('f-who').value||'',
    hospital:'รพ.ลานสกา',
    dbh:dbh.toFixed(4),
    carbon:carbon.toFixed(4),
    co2:co2.toFixed(4),
    photo:photoData,
    synced:false,
    timestamp:new Date().toISOString()
  };
  trees.push(rec);
  saveLoc();
  nextId++;
  toast('✓ บันทึกแล้ว กำลังส่ง Sheets...');
  document.getElementById('add-sync').textContent='⏳ กำลังส่ง...';
  const ok=await sendToSheets(rec);
  if(ok){
    rec.synced=true;saveLoc();
    document.getElementById('add-sync').textContent='✅ ส่งแล้ว';
    toast('✓ บันทึกและส่ง Google Sheets สำเร็จ!');
  } else {
    document.getElementById('add-sync').textContent='⚠️ รอส่งภายหลัง';
    toast('บันทึกแล้ว (จะส่ง Sheets เมื่อมีสัญญาณ)');
  }
  setTimeout(()=>goPage('home'),1200);
}

// ---- GOOGLE SHEETS ----
// ส่งข้อมูลด้วย no-cors (วิธีเดียวที่ใช้ได้กับ Apps Script จาก browser)
async function sendToSheets(rec) {
  const url=localStorage.getItem('gs_url');
  if(!url)return false;
  try {
    // ส่งเป็น FormData เพื่อหลีก CORS preflight
    const form=new FormData();
    form.append('data', JSON.stringify(rec));
    await fetch(url, {method:'POST', body:form, mode:'no-cors'});
    return true; // no-cors ไม่สามารถอ่าน response ได้ ถือว่าสำเร็จ
  } catch(e){return false;}
}

async function syncAll() {
  const url=localStorage.getItem('gs_url');
  if(!url){toast('กรุณาตั้งค่า Apps Script URL ก่อน');return;}
  const pending=trees.filter(t=>!t.synced);
  if(!pending.length){toast('ไม่มีข้อมูลที่รอส่ง');return;}
  toast(`กำลังส่ง ${pending.length} รายการ...`);
  let ok=0;
  for(const rec of pending){
    const sent=await sendToSheets(rec);
    if(sent){rec.synced=true;ok++;}
  }
  saveLoc();renderExport();
  toast(`ส่ง ${ok}/${pending.length} รายการแล้ว กรุณาตรวจสอบใน Sheets`);
}

}

// ---- MAP ----
function renderMap(){
  setTimeout(()=>{
    if(!mapInst){
      mapInst=L.map('map-view').setView([8.0,99.9],13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'© OpenStreetMap',maxZoom:19
      }).addTo(mapInst);
    }
    mapInst.eachLayer(l=>{if(l instanceof L.Marker||l instanceof L.CircleMarker)mapInst.removeLayer(l);});
    const withGPS=trees.filter(t=>t.lat&&t.lng);
    if(!withGPS.length){toast('ยังไม่มีต้นไม้ที่มีพิกัด GPS');return;}
    const bounds=[];
    withGPS.forEach(t=>{
      const lat=parseFloat(t.lat),lng=parseFloat(t.lng);
      const color=t.healthStatus==='สมบูรณ์ดีมาก'?'#1D9E75':t.healthStatus==='ดี'?'#378ADD':t.healthStatus==='ต้องดูแล'?'#E24B4A':'#BA7517';
      const m=L.circleMarker([lat,lng],{radius:10,fillColor:color,color:'#fff',weight:2,fillOpacity:0.9}).addTo(mapInst);
      const pop=`<div style="font-family:sans-serif;min-width:140px">
        <b>${t.treeId} — ${t.species}</b><br>
        เส้นรอบวง: ${t.circumference} cm<br>
        ความสูง: ${t.height||'—'} m<br>
        Carbon: <b>${parseFloat(t.carbon||0).toFixed(2)} kgC</b><br>
        สุขภาพ: ${t.healthStatus||'—'}<br>
        ${t.photo?`<img src="${t.photo}" style="width:100%;margin-top:4px;border-radius:4px">` : ''}
      </div>`;
      m.bindPopup(pop);
      bounds.push([lat,lng]);
    });
    if(bounds.length)mapInst.fitBounds(bounds,{padding:[30,30]});
    setTimeout(()=>mapInst.invalidateSize(),200);
    renderMapFilter();
  },100);
}

function renderMapFilter(){
  const species=[...new Set(trees.map(t=>t.species))];
  const wrap=document.getElementById('map-filter');
  wrap.innerHTML=['ทั้งหมด',...species].map((s,i)=>
    `<button class="mf-chip ${i===0?'sel':''}" onclick="filterMap('${s}',this)">${s}</button>`
  ).join('');
}

function filterMap(sp,btn){
  document.querySelectorAll('.mf-chip').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  if(!mapInst)return;
  mapInst.eachLayer(l=>{if(l instanceof L.CircleMarker)mapInst.removeLayer(l);});
  const filtered=sp==='ทั้งหมด'?trees.filter(t=>t.lat&&t.lng):trees.filter(t=>t.lat&&t.lng&&t.species===sp);
  filtered.forEach(t=>{
    const color=t.healthStatus==='ยอดเยี่ยม'?'#1D9E75':t.healthStatus==='ดี'?'#378ADD':t.healthStatus==='ต้องดูแล'?'#E24B4A':'#BA7517';
    L.circleMarker([parseFloat(t.lat),parseFloat(t.lng)],{radius:10,fillColor:color,color:'#fff',weight:2,fillOpacity:0.9})
      .addTo(mapInst).bindPopup(`<b>${t.treeId} — ${t.species}</b><br>Carbon: ${parseFloat(t.carbon||0).toFixed(2)} kgC`);
  });
}

// ---- DASHBOARD ----
function renderDash(){
  const tc=trees.reduce((s,t)=>s+parseFloat(t.carbon||0),0);
  const tco2=trees.reduce((s,t)=>s+parseFloat(t.co2||0),0);
  const byMon={};
  trees.forEach(t=>{
    const m=t.surveyDate?.slice(0,7)||'ไม่ระบุ';
    if(!byMon[m])byMon[m]={count:0,carbon:0,co2:0};
    byMon[m].count++;
    byMon[m].carbon+=parseFloat(t.carbon||0);
    byMon[m].co2+=parseFloat(t.co2||0);
  });
  const bySp=trees.reduce((a,t)=>{a[t.species]=(a[t.species]||0)+1;return a;},{});
  const byHealth=trees.reduce((a,t)=>{if(t.healthStatus)a[t.healthStatus]=(a[t.healthStatus]||0)+1;return a;},{});
  const maxC=Math.max(...Object.values(byMon).map(v=>v.carbon),0.001);
  const months=Object.entries(byMon).sort((a,b)=>a[0].localeCompare(b[0]));
  document.getElementById('dash-content').innerHTML=`
    <div class="db-grid">
      ${[['ต้นไม้ทั้งหมด',trees.length+' ต้น','var(--green)'],
         ['Carbon รวม',tc.toFixed(2)+' kgC','var(--blue)'],
         ['CO₂ รวม',tco2.toFixed(2)+' kgCO₂','var(--amber)'],
         ['เทียบเท่า',(tco2/1000).toFixed(4)+' tCO₂','#993556']
        ].map(([l,v,c])=>`<div class="db-card"><div class="db-lbl">${l}</div><div class="db-val" style="color:${c}">${v}</div></div>`).join('')}
    </div>
    ${months.length?`
    <div style="margin:12px 12px 4px;font-size:13px;font-weight:600">Carbon สะสมรายเดือน</div>
    <div class="chart-wrap">
      ${months.map(([m,v])=>`
        <div class="bar-row">
          <div class="bar-lbl">${m.slice(5)+'/'+ m.slice(2,4)}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.max(v.carbon/maxC*100,2).toFixed(1)}%">
              <span class="bar-val">${v.carbon.toFixed(1)}</span>
            </div>
          </div>
        </div>
      `).join('')}
    </div>` : ''}
    <div style="margin:12px 12px 4px;font-size:13px;font-weight:600">ชนิดพันธุ์ไม้</div>
    <div class="card" style="margin-top:0">
      ${Object.entries(bySp).sort((a,b)=>b[1]-a[1]).map(([sp,cnt])=>`
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--bdr)">
          <span>${sp}</span><span class="pill pg">${cnt} ต้น</span>
        </div>`).join('') || '<p style="color:var(--text2);font-size:13px">ยังไม่มีข้อมูล</p>'}
    </div>
    <div style="margin:12px 12px 4px;font-size:13px;font-weight:600">สถานะสุขภาพ</div>
    <div class="card" style="margin-top:0">
      ${Object.entries(byHealth).map(([h,cnt])=>`
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--bdr)">
          <span>${h}</span><span class="pill pb">${cnt} ต้น</span>
        </div>`).join('') || '<p style="color:var(--text2);font-size:13px">ยังไม่มีข้อมูล</p>'}
    </div>
  `;
}

function dlCSV(){
  if(!trees.length){toast('ยังไม่มีข้อมูล');return;}
  const h='Tree ID,Survey Date,Species,Circumference(cm),DBH(cm),Height(m),Lat,Long,Land Type,Health,Carbon(kgC),CO2(kgCO2),Survey By,Hospital,Synced\n';
  const r=trees.map(t=>[t.treeId,t.surveyDate,t.species,t.circumference,t.dbh,t.height,t.lat,t.lng,t.landType,t.healthStatus,t.carbon,t.co2,t.surveyBy,t.hospital,t.synced?'Yes':'No'].join(',')).join('\n');
  const b=new Blob(['\uFEFF'+h+r],{type:'text/csv;charset=utf-8;'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download='tree_carbon_lansaka_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(u);
  toast('ดาวน์โหลดสำเร็จ');
}
